version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tickettr
      POSTGRES_USER: tickettr
      POSTGRES_PASSWORD: tickettr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickettr -d tickettr"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: web
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      target: bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
